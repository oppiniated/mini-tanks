<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Tanks Web Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- The offscreen canvas for mask will be managed in JS. -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="top-bar">
                <div class="player-info p1-info">
                    <span class="player-name">Player 1</span>
                    <div class="health-bar-container"><div id="p1-health" class="health-bar"></div></div>
                    <span id="p1-score">Score: 0</span>
                    <span id="p1-turns" style="font-size:0.85rem; color:#94a3b8">Turns left: 10</span>
                </div>
                <div class="status-panel">
                    <div id="turn-indicator">Player 1's Turn</div>
                    <div id="wind-indicator">Wind: <span id="wind-val">0</span></div>
                    <div class="wind-toggle-container">
                        <label><input type="checkbox" id="wind-toggle" checked> Enable Wind</label>
                    </div>
                    <button id="sfx-btn" title="Toggle Sound">🔊</button>
                </div>
                <div class="player-info p2-info">
                    <span class="player-name" id="p2-name">Player 2</span>
                    <div class="health-bar-container"><div id="p2-health" class="health-bar"></div></div>
                    <span id="p2-score">Score: 0</span>
                    <span id="p2-turns" style="font-size:0.85rem; color:#94a3b8">Turns left: 10</span>
                </div>
            </div>

            <div id="control-panel">
                <div class="control-group">
                    <label>Angle: <span id="angle-val">45</span>&deg;</label>
                    <input type="range" id="angle-slider" min="0" max="359" value="45">
                </div>
                <div class="control-group">
                    <label>Power: <span id="power-val">50</span></label>
                    <input type="range" id="power-slider" min="0" max="100" value="50">
                </div>
                <div class="control-group">
                    <button id="weapon-select-btn">Weapon: Single Shot</button>
                </div>
                <div class="control-group">
                    <label>Moves: <span id="moves-left-val">4</span></label>
                    <div style="display:flex; gap:5px;">
                        <button id="move-left-btn" style="padding: 5px 15px;">&lt;</button>
                        <button id="move-right-btn" style="padding: 5px 15px;">&gt;</button>
                    </div>
                </div>
                <button id="fire-btn">FIRE</button>
            </div>

            <!-- Start / Mode Select Screen -->
            <div id="start-screen">
                <h1 style="font-size:2.5rem; margin-bottom: 8px;">🎯 Mini Tanks</h1>
                <p style="color:#94a3b8; margin-bottom:32px;">Choose your game mode</p>
                <div style="display:flex; gap:16px; justify-content:center; margin-bottom:24px;">
                    <button id="btn-1p" class="mode-btn">⚔️ 1 Player</button>
                    <button id="btn-2p" class="mode-btn">👥 2 Players</button>
                </div>
                <div id="color-section" class="hidden">
                    <div id="p1-color-row">
                        <p class="color-label" id="p1-color-label">Your Tank Color</p>
                        <div class="color-swatches" id="p1-swatches"></div>
                    </div>
                    <div id="p2-color-row" class="hidden">
                        <p class="color-label">Player 2 Color</p>
                        <div class="color-swatches" id="p2-swatches"></div>
                    </div>
                    <div id="difficulty-select" class="hidden">
                        <p class="color-label" style="margin-top:8px;">Difficulty</p>
                        <div style="display:flex; gap:12px; justify-content:center; margin-bottom:4px;">
                            <button class="diff-btn" data-diff="easy">😊 Easy</button>
                            <button class="diff-btn selected" data-diff="medium">🎯 Medium</button>
                            <button class="diff-btn" data-diff="hard">💀 Hard</button>
                        </div>
                    </div>
                    <button id="start-btn" class="mode-btn start-btn">▶ Start Game</button>
                </div>
            </div>

            <!-- Weapon Selection Modal -->
            <div id="weapon-modal" class="hidden">
                <div class="modal-content">
                    <h2>Select Weapon</h2>
                    <div id="weapon-list"></div>
                    <button id="close-modal-btn">Close</button>
                </div>
            </div>
            
            <!-- Game Over Screen -->
            <div id="game-over-screen" class="hidden">
                <h1 id="winner-text">Player X Wins!</h1>
                <button id="restart-btn">Play Again</button>
            </div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
