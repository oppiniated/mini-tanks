name: "Fallow Codebase Intelligence"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fallow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # For PR comments/annotations if needed
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for changed-since analysis
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          
      - name: Install dependencies
        run: npm ci

      - name: Run Fallow Codebase Intelligence
        uses: fallow-rs/fallow@v2
        with:
          comment: 'true'
          review-comments: 'true'
